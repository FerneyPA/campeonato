# ============================================================
# Mensajes del sistema — Español (archivo base)
# Archivo: mensajes.properties
# Para agregar un idioma crea mensajes_XX.properties
# donde XX es el código ISO del idioma (en, fr, pt, etc.)
# ============================================================

# ------------------------------------------------------------
# Errores DAO
# ------------------------------------------------------------
DAO-001=Error al consultar datos. Por favor intenta de nuevo.
DAO-002=Error al guardar datos. Por favor intenta de nuevo.
DAO-003=Error al actualizar datos. Por favor intenta de nuevo.
DAO-004=Error al eliminar datos. Por favor intenta de nuevo.
DAO-005=Error de conexión con la base de datos.

# ------------------------------------------------------------
# Errores Business
# ------------------------------------------------------------
BUS-001=Los datos ingresados no son válidos.
BUS-002=Usuario o contraseña incorrectos.
BUS-003=Tu sesión ha expirado. Por favor inicia sesión de nuevo.
BUS-004=Ocurrió un error en el proceso. Por favor intenta de nuevo.
BUS-005=El recurso solicitado no fue encontrado.

# ------------------------------------------------------------
# Mensajes de validación de campos
# ------------------------------------------------------------
campo.usuario.requerido=El usuario es obligatorio.
campo.password.requerido=La contraseña es obligatoria.

# ------------------------------------------------------------
# Mensajes generales
# ------------------------------------------------------------
error.inesperado=Error inesperado. Por favor contacta al administrador.
login.exitoso=Bienvenido al sistema {}.
logout.exitoso=Sesión cerrada correctamente.

# ------------------------------------------------------------
# Mensajes informativos — operaciones exitosas
# ------------------------------------------------------------
info.guardado=Registro guardado correctamente.
info.actualizado=Registro actualizado correctamente.
info.eliminado=Registro eliminado correctamente.
info.procesado=Proceso ejecutado correctamente.
info.cargado=Información cargada correctamente.

# ------------------------------------------------------------
# Mensajes de advertencia
# ------------------------------------------------------------
warn.sinResultados=No se encontraron resultados para la búsqueda.
warn.sinCambios=No se realizaron cambios.
warn.sesionPorExpirar=Tu sesión está por expirar. Por favor guarda tu trabajo.

# ------------------------------------------------------------
# Mensajes de log — uso interno, no se muestran al usuario
# ------------------------------------------------------------
log.login.inicio=Iniciando proceso de login para usuario: {}
log.login.fin=Login exitoso para usuario: {}
log.login.error=Error en login para usuario: {}
log.logout.inicio=Iniciando proceso de logout para usuario: {}
log.logout.fin=Logout exitoso para usuario: {}
log.credenciales.invalidas=Credenciales inválidas para usuario: {}
log.error.inesperado=Error inesperado en el proceso: {}