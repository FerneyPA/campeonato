<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="jakarta.faces.facelets">

<ui:composition template="/WEB-INF/template-login.xhtml">

    <ui:define name="contenido">

        <h:form id="loginForm">

            <p:growl id="mensajes" showDetail="false" life="5000"/>

            <p:card style="width: 380px;">

                <f:facet name="header">
                    <h:outputText value="#{msg.loginEncabezado}"/>
                </f:facet>

                <p:panelGrid columns="1" style="width: 100%" columnClasses="label,value">

                    <p:outputLabel value="#{msg.loginLabelUsuario}" for="username"/>
                    <p:inputText id="username"
                                 value="#{loginBean.username}"
                                 required="true"
                                 requiredMessage="#{msg.loginValidacionUsuario}"
                                 style="width: 100%"/>

                    <p:outputLabel value="#{msg.loginLabelPassword}" for="password"/>
                    <p:password id="password"
                                value="#{loginBean.password}"
                                required="true"
                                requiredMessage="#{msg.loginValidacionPassword}"
                                feedback="false"
                                style="width: 100%"/>

                </p:panelGrid>

                <p:commandButton value="#{msg.loginBotonEntrar}"
                                 action="#{loginBean.login}"
                                 update="mensajes"
                                 style="width: 100%; margin-top: 16px"
                                 icon="pi pi-sign-in"/>

            </p:card>

        </h:form>

    </ui:define>

</ui:composition>

</html>
