<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="jakarta.faces.facelets">

<ui:composition template="/WEB-INF/template.xhtml">

    <ui:define name="titulo">
        #{msg.homeTitulo}
    </ui:define>

    <ui:define name="contenido">

        <p:card style="margin: 32px; max-width: 600px;">
            <f:facet name="header">
                <h:outputText value="#{msg.homeBienvenida} #{usuarioSesion.username}"/>
            </f:facet>

            <h:panelGrid columns="2" columnClasses="label,value" style="width:100%; margin-top:10px;">
                <h:outputText value="Usuario:"/>
                <h:outputText value="#{usuarioSesion.username}"/>

                <h:outputText value="Rol:"/>
                <h:outputText value="#{usuarioSesion.rol}"/>
            </h:panelGrid>

            <p:divider/>

            <h:outputText value="Seleccione una opción del menú superior para continuar."/>
        </p:card>

    </ui:define>

</ui:composition>

</html>
